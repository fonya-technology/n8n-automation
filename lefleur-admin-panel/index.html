<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Le Fleur Boutique Admin</title>

    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <div class="container">
      <header class="topbar">
        <div class="brand-section">
          <img
            src="./assets/le-fleur-logo.png"
            class="brand-logo"
            alt="Le Fleur Boutique"
          />

          <p class="brand-subtitle">Product Catalog Administration</p>
        </div>

        <div class="top-actions">
          <button class="add-btn" id="openModal">+ Add Product</button>

          <button id="openGalleryPage" class="gallery-btn">
            Product Gallery
          </button>
        </div>
      </header>

      <section class="controls">
        <input
          type="text"
          placeholder="Search products..."
          class="search-input"
        />
      </section>

      <section class="table-container">
        <table>
          <thead>
            <tr>
              <th>Image</th>
              <th>Code</th>
              <th>Product Name</th>
              <th>Product Category</th>
              <th>Product Description</th>
              <th>Price</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody id="productTableBody">
            <tr class="loading-row">
              <td colspan="7">
                <div class="loading-container">
                  <div class="loading-spinner"></div>
                  <p>Loading products...</p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </section>
      <div class="powered-by">
        <p>Powered by</p>

        <img
          src="./assets/fonya-logo.png"
          class="powered-logo"
          alt="Fonya Technology"
        />
      </div>
    </div>

    <div class="modal hidden" id="productModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modalTitle">Add Product</h2>

          <button class="close-btn" id="closeModal">×</button>
        </div>

        <form class="product-form" id="productForm">
          <div class="form-group">
            <label class="required">Product Code</label>

            <input
              type="text"
              placeholder="Product Code"
              id="productCode"
              required
            />
          </div>

          <div class="form-group">
            <label class="required">Product Name</label>

            <input
              type="text"
              placeholder="Product Name"
              id="productName"
              required
            />
          </div>

          <select id="productCategory" required>
            <option value="">Select Product Category</option>

            <option value="necklace">Necklace</option>

            <option value="keychain">Keychain</option>

            <option value="coaster">Coaster</option>

            <option value="fullblock">Fullblock</option>

            <option value="regressed">Regressed</option>

            <option value="wedding">Wedding Preservation</option>
          </select>

          <div class="form-group">
            <label class="required">Product Description</label>

            <textarea
              placeholder="Product Description"
              id="productDescription"
              required
            ></textarea>
          </div>

          <div class="form-group">
            <label class="required">Price</label>

            <input type="text" placeholder="Price" id="productPrice" required />
          </div>

          <div class="form-group">
            <label class="required">Product Image</label>

            <input type="file" id="productImage" accept="image/*" required />
          </div>

          <img id="imagePreview" class="image-preview" />

          <div class="form-actions">
            <button type="submit" class="submit-btn" id="submitButton">
              Create Product
            </button>

            <button type="button" class="cancel-btn" id="cancelModal">
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>

    <div class="modal hidden" id="deleteModal">
      <div class="modal-content delete-modal-content">
        <div class="modal-header">
          <h2>Delete Product</h2>

          <button class="close-btn" id="closeDeleteModal">×</button>
        </div>

        <p class="delete-text">Are you sure you want to delete this product?</p>

        <div class="form-actions">
          <button type="button" class="cancel-btn" id="cancelDelete">
            Cancel
          </button>

          <button type="button" class="delete-btn" id="confirmDelete">
            Delete
          </button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast hidden">
      <span id="toastMessage"></span>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
